<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChequeWeb - Preenchedor de Cheques</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --fonte-cheque:"Courier New",monospace;
            --peso-padrao:600;
            --tam-valor-num:13pt; --tam-extenso:11pt; --tam-nominal:11pt;
            --tam-data:10pt; --tam-bom-para:9pt;
            --print-offset-x:0mm; --print-offset-y:0mm;
            --bg-primary:#f0f2f5; --bg-secondary:#fff;
            --text-primary:#333; --text-secondary:#555; --text-tertiary:#999;
            --border-color:#ededed;
            --header-bg:linear-gradient(135deg,#1e3c72 0%,#2a5298 100%);
            --accent-color:#2a5298;
            --accent-glow:rgba(42,82,152,0.4);
            --shadow-light:0 4px 15px rgba(0,0,0,0.1);
            --shadow-dark:0 8px 25px rgba(0,0,0,0.15);
            --shadow-inset:inset 0 2px 5px rgba(0,0,0,0.1);
            --cheque-bg-opacity:0.75;
        }

        body.tema-escuro {
            --bg-primary:#1a1a1a; --bg-secondary:#2d2d2d;
            --text-primary:#e0e0e0; --text-secondary:#b0b0b0; --text-tertiary:#808080;
            --border-color:#404040;
            --header-bg:linear-gradient(135deg,#0f1419 0%,#1a2332 100%);
            --accent-color:#4a9eff; --accent-glow:rgba(74,158,255,0.5);
            --shadow-light:0 4px 15px rgba(0,0,0,0.3);
            --shadow-dark:0 8px 25px rgba(0,0,0,0.4);
            --shadow-inset:inset 0 2px 5px rgba(0,0,0,0.3);
        }

        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:var(--bg-primary);color:var(--text-primary);transition:background-color .3s,color .3s}

        /* Classes auxiliares */
        .container{max-width:1200px;margin:0 auto;padding:20px}
        .panel{background:var(--bg-secondary);padding:20px;border-radius:10px;box-shadow:var(--shadow-light);margin-bottom:20px}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;margin-bottom:5px;font-weight:bold}
        .form-group input{width:100%;padding:10px;border:1px solid var(--border-color);border-radius:5px;background:var(--bg-secondary);color:var(--text-primary)}
        
        .btn{padding:10px 20px;border:none;border-radius:5px;cursor:pointer;font-weight:bold;transition:0.3s}
        .btn-primary{background:var(--accent-color);color:white}
        .btn-primary:hover{opacity:0.8}

        #cheque-preview {
            width: 17.5cm;
            height: 7.5cm;
            background: #fffbe6;
            border: 1px solid #ccc;
            margin: 20px auto;
            position: relative;
            font-family: var(--fonte-cheque);
            color: #000;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="container">
            <h1>ChequeWeb</h1>
            <p>Preenchedor de Cheques Profissional</p>
        </div>
    </div>

    <div class="container">
        <div class="panel">
            <h3>Dados do Cheque</h3>
            <div class="form-group">
                <label>Valor (R$)</label>
                <input type="number" id="input-valor" placeholder="0,00" step="0.01">
            </div>
            <div class="form-group">
                <label>Nominal a (Favorecido)</label>
                <input type="text" id="input-nominal" placeholder="Nome da pessoa ou empresa">
            </div>
            <div class="form-group">
                <label>Cidade</label>
                <input type="text" id="input-cidade" value="Sua Cidade">
            </div>
            <div class="form-group">
                <label>Data</label>
                <input type="date" id="input-data">
            </div>
            
            <button class="btn btn-primary" onclick="processarCheque()">Salvar e Gerar Cheque</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DA SUA API NO RENDER
        const API_URL = "https://chequeweb-api.onrender.com";

        // Preencher a data de hoje automaticamente
        document.getElementById('input-data').valueAsDate = new Date();

        async function processarCheque() {
            // 1. Coleta os dados do formulário
            const dados = {
                valor: parseFloat(document.getElementById('input-valor').value) || 0,
                extenso: "VALOR POR EXTENSO (GERADO AUTOMATICAMENTE)", // Aqui você pode usar sua função de extenso
                nominal: document.getElementById('input-nominal').value,
                cidade: document.getElementById('input-cidade').value,
                data: document.getElementById('input-data').value
            };

            if (dados.valor <= 0 || !dados.nominal) {
                alert("Por favor, preencha o valor e o favorecido.");
                return;
            }

            // 2. Tenta salvar na Nuvem (Render/Turso)
            try {
                console.log("Enviando para nuvem...");
                
                const response = await fetch(`${API_URL}/salvar`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dados)
                });

                if (response.ok) {
                    alert("✅ Cheque salvo com sucesso no Banco de Dados!");
                } else {
                    alert("❌ Erro ao salvar no servidor.");
                }
            } catch (error) {
                console.error("Erro:", error);
                alert("⚠️ O servidor pode estar 'acordando'. Tente novamente em alguns segundos.");
            }
        }
    </script>
</body>
</html>
